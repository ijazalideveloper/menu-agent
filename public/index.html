<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>AI Chat Assistant</title>
    <style>
      :root {
        --bg-color: #f7f9fc;
        --card-bg: #ffffff;
        --text-color: #1e293b;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --border: #e2e8f0;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: var(--bg-color);
        color: var(--text-color);
        height: 100%;
        display: flex;
        flex-direction: column;
      }

      /* Layout Container */
      .chat-container {
        max-width: 800px;
        width: 100%;
        margin: 0 auto;
        display: flex;
        flex-direction: column;
        height: 100vh;
        background: var(--card-bg);
        box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      }

      /* Header */
      h1 {
        text-align: center;
        font-size: 1.5rem;
        padding: 1rem;
        margin: 0;
        border-bottom: 1px solid var(--border);
        font-weight: 600;
      }

      /* Chat History Area */
      #chat {
        flex: 1;
        overflow-y: auto;
        padding: 1.5rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
      }

      /* Message Bubbles (For future JS implementation) */
      .message {
        max-width: 75%;
        padding: 0.75rem 1rem;
        border-radius: 1rem;
        line-height: 1.5;
        font-size: 0.95rem;
      }
      .message.user {
        background-color: var(--primary);
        color: white;
        align-self: flex-end;
        border-bottom-right-radius: 0.25rem;
      }
      .message.agent {
        background-color: var(--border);
        color: var(--text-color);
        align-self: flex-start;
        border-bottom-left-radius: 0.25rem;
      }

      /* Input Form Area */
      .input-area {
        display: flex;
        padding: 1rem;
        gap: 0.5rem;
        border-top: 1px solid var(--border);
        background: var(--card-bg);
      }

      input[type="text"] {
        flex: 1;
        padding: 0.75rem 1rem;
        border: 1px solid var(--border);
        border-radius: 0.5rem;
        font-size: 1rem;
        outline: none;
        transition: border-color 0.2s;
      }

      input[type="text"]:focus {
        border-color: var(--primary);
      }

      button {
        padding: 0.75rem 1.5rem;
        background-color: var(--primary);
        color: white;
        border: none;
        border-radius: 0.5rem;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: var(--primary-hover);
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <h1>Menu Assistant</h1>

      <div id="chat">
        <!-- Example bubbles showing how they will render -->
        <div class="message agent">
          Hello! Ask me about breakfast or the dinner menu.
        </div>
        <div class="message user">What's on the dinner menu?</div>
      </div>

      <div class="input-area">
        <input
          type="text"
          id="message"
          placeholder="Ask me: What's on the dinner menu?"
        />
        <button id="send" onclick="sendMessage()">Send</button>
        <script>
          async function sendMessage() {
            const inputField = document.getElementById("message");
            const input = inputField.value.trim();
            if (!input) return;

            // Append user message immediately to the UI
            const chatDiv = document.getElementById("chat");
            chatDiv.innerHTML += `<div class="message user">${input}</div>`;
            chatDiv.scrollTop = chatDiv.scrollHeight;
            inputField.value = "";

            try {
              // FIX 3: Change body payload key from 'message' to 'input' to match the backend expectations
              const response = await fetch("/api/chat", {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                },
                body: JSON.stringify({ input: input }),
              });

              const data = await response.json();

              // FIX 4: Access 'data.result' instead of 'data.output' to match your express JSON response
              const reply =
                data.result || data.error || "No response generated.";

              chatDiv.innerHTML += `<div class="message agent">${reply}</div>`;
              chatDiv.scrollTop = chatDiv.scrollHeight;
            } catch (error) {
              console.error("Error:", error);
              chatDiv.innerHTML += `<div class="message agent">Failed to reach the server.</div>`;
            }
          }

          // Optional: Allows pressing "Enter" key to send message
          document
            .getElementById("message")
            .addEventListener("keypress", function (e) {
              if (e.key === "Enter") {
                sendMessage();
              }
            });
        </script>
      </div>
    </div>
  </body>
</html>
